name: CI

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ["3.12"]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .
                  pip install pytest pytest-asyncio ruff black mypy build twine

            - name: Ruff
              run: ruff check .

            - name: Black
              run: black --check .

            - name: Mypy
              run: mypy src/

            - name: Pytest
              run: pytest

            - name: Build package
              run: python -m build

            - name: Verify package
              run: twine check dist/*
